[tools]
python = "3.13.13"
uv = "latest"

# ── install ───────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install Python deps and Playwright Chromium"
run = [
    "uv sync",
    "uv run playwright install chromium",
]

[tasks."install:deps"]
description = "Install Chromium system deps (needs sudo)"
run = "uv run playwright install-deps chromium"

# ── auth ──────────────────────────────────────────────────────────────────────

[tasks."login:tenbis"]
description = "Log in to 10bis with a headed browser (run locally)"
run = "uv run tenbis login-tenbis"

[tasks."login:whatsapp"]
description = "Log in to WhatsApp Web with a headed browser / QR scan (run locally)"
run = "uv run tenbis login-whatsapp"

[tasks."login:tenbis:server"]
description = "Log in to 10bis on a headless server using xvfb-run (enter OTP when prompted)"
run = "xvfb-run --auto-servernum uv run tenbis login-tenbis"

# ── daily ops ─────────────────────────────────────────────────────────────────

[tasks.budget]
description = "Print current 10bis budget (no purchase)"
run = "uv run tenbis budget"

[tasks."purchase:dry"]
description = "Dry-run purchase: go through the whole flow but don't click Submit"
run = "DRY_RUN=true uv run tenbis purchase"

[tasks.purchase]
description = "Purchase a Shufersal 200 ILS voucher"
run = "uv run tenbis purchase"


[tasks.scan]
description = "Scan WhatsApp for used vouchers (any reaction) and acknowledge with 🤖"
run = "uv run tenbis scan-reactions"

[tasks.run]
description = "Full daily pipeline: scan reactions → purchase → send (idempotent)"
run = "uv run tenbis run"

[tasks."vouchers:list"]
description = "Show active and acknowledged vouchers by scanning the WhatsApp group"
run = "uv run tenbis list-vouchers"

[tasks."vouchers:send-pending"]
description = "Send locally saved pending vouchers to WhatsApp"
run = "uv run tenbis send-pending-vouchers"

# ── dev ───────────────────────────────────────────────────────────────────────

[tasks.fmt]
description = "Format code with ruff"
run = "uv run ruff format src tests"

[tasks.lint]
description = "Lint and type-check with ruff + ty"
run = ["uv run ruff check src tests", "uv run ty check"]

[tasks.test]
description = "Run tests"
run = "uv run pytest"
